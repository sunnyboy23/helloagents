# HelloAGENTS Codex CLI Hooks 参考配置（仅供参考，非自动部署源）
#
# 此文件是 Codex CLI 配置的参考文档。实际配置由 config_helpers.py 中的
# _configure_codex_notify() 和 _configure_codex_csv_batch() 程序化写入
# ~/.codex/config.toml，不会直接读取此文件。
#
# 角色调度规则见 G9/G10。

# ─── Features ───

# enable_fanout — 启用 CSV 批处理编排（spawn_agents_on_csv）
# multi_agent（子代理）已 Stable 默认开启，无需显式配置
[features]
enable_fanout = true

# ─── Hooks ───

# notify — 代理轮次完成时触发
# 格式: notify = ["命令路径"]（数组格式）
# JSON payload 包含: type, thread-id, turn-id, cwd, client (v0.107+)
notify = ["helloagents --check-update --silent"]

# tui.notifications — 事件类型过滤（可选）
# 格式: 布尔或事件类型数组
# tui.notifications = ["agent-turn-complete", "approval-requested"]

# ─── 多代理配置（需 /experimental 或 /agent 开启）───

# 全局代理限制
# agents.max_threads = 16        # 最大并发子代理线程数（spawn_agent ≤6，CSV ≤64）
# agents.max_depth = 1           # 嵌套深度（默认 1，仅一层）

